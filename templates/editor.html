{% extends "base.html" %}

{% block title %}编辑博客 - 博客发布系统{% endblock %}

{% block content %}
<form id="blog-form" method="post" action="/api/publish">
    <!-- Basic Info -->
    <section class="form-section">
        <h2>Basic Info</h2>
        <div class="form-row">
            <label for="page_h1_title">page_h1_title *</label>
            <input type="text" id="page_h1_title" name="page_h1_title" required>
        </div>
        <div class="form-row">
            <label for="meta_title">meta_title *</label>
            <input type="text" id="meta_title" name="meta_title" required>
        </div>
        <div class="form-row">
            <label for="url_slug">url_slug *</label>
            <input type="text" id="url_slug" name="url_slug" required
                   pattern="[a-z0-9\-]+"
                   title="Only lowercase letters, numbers and hyphens allowed">
        </div>
    </section>

    <!-- SEO Info -->
    <section class="form-section">
        <h2>SEO Info</h2>
        <div class="form-row">
            <label for="meta_description">meta_description *</label>
            <textarea id="meta_description" name="meta_description" rows="2" required></textarea>
        </div>
        <div class="form-row">
            <label for="summary">summary *</label>
            <textarea id="summary" name="summary" rows="2" required></textarea>
        </div>
        <div class="form-row">
            <label for="image">image *</label>
            <input type="url" id="image" name="image" required>
        </div>
    </section>

    <!-- Metadata -->
    <section class="form-section">
        <h2>Metadata</h2>
        <div class="form-grid">
            <div class="form-row">
                <label for="post_date">date *</label>
                <input type="date" id="post_date" name="post_date" value="{{ today }}" required>
            </div>
            <div class="form-row">
                <label for="editor_name">editor_name *</label>
                <input type="text" id="editor_name" name="editor_name" required>
            </div>
            <div class="form-row">
                <label for="category_folder">category_folder *</label>
                <select id="category_folder" name="category_folder" required>
                    {% for category in categories %}
                    <option value="{{ category }}">{{ category }}</option>
                    {% endfor %}
                    <option value="__new__">+ New folder</option>
                </select>
                <input type="text" id="new_category" placeholder="Enter new folder name" style="display:none;">
            </div>
        </div>
        <div class="form-grid">
            <div class="form-row">
                <label for="content_type">content_type *</label>
                <input type="text" id="content_type" name="content_type" required>
            </div>
            <div class="form-row">
                <label for="content_category">content_category *</label>
                <input type="text" id="content_category" name="content_category" required>
            </div>
            <div class="form-row">
                <label for="tags">tags (comma separated) *</label>
                <input type="text" id="tags" name="tags" required placeholder="tag1, tag2, tag3">
            </div>
        </div>
    </section>

    <!-- Markdown Editor -->
    <section class="form-section">
        <h2>Markdown Content</h2>
        <div class="editor-container">
            <div class="editor-pane">
                <h3>Edit</h3>
                <textarea id="content" name="content"></textarea>
            </div>
            <div class="preview-pane">
                <h3>Preview</h3>
                <div id="preview"></div>
            </div>
        </div>
    </section>

    <!-- TOC -->
    <section class="form-section">
        <h2>custom_toc <button type="button" id="refresh-toc" class="btn-small">Refresh</button></h2>
        <div id="toc-container">
            <p class="hint">Auto-generated from H2 headings in Markdown content</p>
            <div id="toc-list"></div>
            <button type="button" id="add-toc" class="btn-small">+ Add TOC item</button>
        </div>
        <input type="hidden" id="toc_json" name="toc_json" value="[]">
    </section>

    <!-- Submit -->
    <section class="form-actions">
        <button type="submit" class="btn-primary" id="submit-btn">Submit</button>
        <span id="submit-status"></span>
    </section>
</form>
{% endblock %}

{% block scripts %}
<script src="/static/js/editor.js"></script>
{% endblock %}
